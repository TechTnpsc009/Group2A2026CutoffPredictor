<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings Dashboard | Group 2A Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="db-container">
    <header class="db-header">
        <div>
            <h1 style="color:var(--primary-purple); margin:0; font-size:1.6rem;">Live Rankings</h1>
            <p style="margin:5px 0 0 0; font-size:0.85rem; color:#6b7280;">Communal & Special Reservation Analysis</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="toggleAll(true)" class="btn-outline" style="font-size:0.7rem; padding:6px 12px;">Expand All</button>
            <button onclick="toggleAll(false)" class="btn-outline" style="font-size:0.7rem; padding:6px 12px;">Collapse All</button>
        </div>
    </header>

    <div style="margin-bottom: 20px;">
        <input type="text" id="globalSearch" placeholder="Search nickname..." onkeyup="handleSearch()" 
               style="width:100%; padding:12px; border-radius:10px; border:1.5px solid var(--border-purple);">
    </div>

    <div id="accordion-root">
        <p style="text-align:center; padding:40px; color:var(--primary-purple);">Loading community data...</p>
    </div>
    
    <div style="margin-top:40px; text-align:center; padding-bottom: 40px;">
        <a href="index.html" class="btn-primary" style="padding: 15px 50px;">Add your score</a>
    </div>
</div>

<div class="footer-sig">An Allwin-Sugitha Initiative</div>

<script>
    const SB_URL = "https://tmxtrpcxgowyvsijptjy.supabase.co";
    const SB_KEY = "sb_publishable_HyUD5W3MBGCUNYiNLOZHKQ_mMVcKa1-";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const communities = ['GT', 'BC', 'BCM', 'MBC', 'SC', 'SCA', 'ST'];
    let allData = [];

    async function loadDashboard() {
        const { data, error } = await supabaseClient
            .from('candidate_scores')
            .select('*')
            .order('total_correct', { ascending: false });

        if (error) return;
        allData = data;
        renderAccordions();
    }

    function renderAccordions() {
        const root = document.getElementById('accordion-root');
        root.innerHTML = communities.map(comm => {
            const list = allData.filter(d => d.category === comm);
            return `
                <div class="accordion-item" id="item-${comm}">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <div>
                            <span class="cat-name">${comm}</span>
                            <span style="font-size:0.75rem; color:#6b7280; margin-left:10px;">(${list.length} total)</span>
                        </div>
                        <span class="arrow">▾</span>
                    </div>
                    <div class="accordion-content">
                        <div class="filter-group">
                            <label class="filter-label">Refine by Rotation:</label>
                            <select class="smart-select" onchange="applyFilter('${comm}', this.value)">
                                <option value="G"> (G) General / All</option>
                                <option value="G_PSTM"> (G) PSTM</option>
                                <option value="G_EXSER"> (G) Ex-Serviceman</option>
                                <option value="G_EXSER_PSTM"> (G) Ex-Serviceman (PSTM)</option>
                                <option value="W"> (W) Women Only</option>
                                <option value="W_PSTM"> (W) PSTM</option>
                                <option value="DW"> (DW) Destitute Widow</option>
                                <option value="DW_PSTM"> (DW) PSTM</option>
                                <option value="PwD"> PwD (Physically Challenged)</option>
                            </select>
                        </div>
                        <div id="list-container-${comm}">${renderList(list)}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function applyFilter(comm, type) {
        let filtered = allData.filter(d => d.category === comm);

        switch(type) {
            case 'G_PSTM': filtered = filtered.filter(d => d.is_pstm); break;
            case 'G_EXSER': filtered = filtered.filter(d => d.is_exser); break;
            case 'G_EXSER_PSTM': filtered = filtered.filter(d => d.is_exser && d.is_pstm); break;
            case 'W': filtered = filtered.filter(d => d.is_woman); break;
            case 'W_PSTM': filtered = filtered.filter(d => d.is_woman && d.is_pstm); break;
            case 'DW': filtered = filtered.filter(d => d.is_dw); break;
            case 'DW_PSTM': filtered = filtered.filter(d => d.is_dw && d.is_pstm); break;
            case 'PwD': filtered = filtered.filter(d => (d.is_vi_lv || d.is_hi_hh || d.is_ld_cp || d.is_asd_md)); break;
        }

        document.getElementById(`list-container-${comm}`).innerHTML = renderList(filtered);
    }

    function renderList(list) {
        if (list.length === 0) return '<p style="color:#9ca3af; font-size:0.85rem; padding:20px; text-align:center;">No entries match this rotation.</p>';
        return list.map((d, index) => {
            let tags = [];
            if(d.is_woman) tags.push("W");
            if(d.is_pstm) tags.push("PSTM");
            if(d.is_exser) tags.push("EXSER");
            if(d.is_dw) tags.push("DW");
            if(d.is_vi_lv || d.is_hi_hh || d.is_ld_cp || d.is_asd_md) tags.push("PwD");

            return `
                <div class="score-row">
                    <div>
                        <span style="font-weight:700;">${index < 3 ? ['🥇','🥈','🥉'][index] : ''}${d.full_name}</span>
                        <span style="display:block; font-size:0.7rem; color:var(--muted-purple); font-weight:700;">${tags.join(' • ') || 'General'}</span>
                    </div>
                    <div style="text-align:right;">
                        <span class="score-val">${d.total_correct}</span>
                        <div style="font-size:0.6rem; color:#9ca3af; font-weight:bold;">RANK ${index + 1}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Reuse previous toggleAccordion, toggleAll, and handleSearch functions
    function toggleAccordion(header) {
        header.classList.toggle('active');
        header.nextElementSibling.classList.toggle('open');
        header.querySelector('.arrow').innerText = header.nextElementSibling.classList.contains('open') ? '▴' : '▾';
    }

    function toggleAll(expand) {
        document.querySelectorAll('.accordion-header').forEach(h => {
            const content = h.nextElementSibling;
            if (expand) { h.classList.add('active'); content.classList.add('open'); h.querySelector('.arrow').innerText = '▴'; }
            else { h.classList.remove('active'); content.classList.remove('open'); h.querySelector('.arrow').innerText = '▾'; }
        });
    }

    function handleSearch() {
        const q = document.getElementById('globalSearch').value.toLowerCase();
        document.querySelectorAll('.accordion-item').forEach(item => {
            const match = item.innerText.toLowerCase().includes(q);
            item.style.display = match ? 'block' : 'none';
            if(q && match) { item.querySelector('.accordion-header').classList.add('active'); item.querySelector('.accordion-content').classList.add('open'); }
        });
    }

    loadDashboard();
</script>
</body>
</html>
