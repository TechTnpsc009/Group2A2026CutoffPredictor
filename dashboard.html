<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="db-container">
    <header class="db-header">
        <h1 style="color:var(--primary-purple); margin:0;">Rankings</h1>
        <div style="display:flex; gap:10px;">
            <button onclick="toggleAll(true)" class="btn-outline" style="font-size:0.7rem;">Expand All</button>
            <button onclick="toggleAll(false)" class="btn-outline" style="font-size:0.7rem;">Collapse All</button>
        </div>
    </header>

    <div id="accordion-root"></div>
    
    <div style="margin-top:20px; text-align:center;">
        <a href="index.html" class="btn-primary">← Add New Score</a>
    </div>
</div>

<div class="footer-sig">An Allwin-Sugitha Initiative</div>

<script>
    const SB_URL = "https://tmxtrpcxgowyvsijptjy.supabase.co";
    const SB_KEY = "sb_publishable_HyUD5W3MBGCUNYiNLOZHKQ_mMVcKa1-";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    const communities = ['GT', 'BC', 'BCM', 'MBC', 'SC', 'SCA', 'ST'];

    async function loadDashboard() {
        const { data, error } = await supabaseClient.from('candidate_scores').select('*').order('total_correct', { ascending: false });
        if (error) return;

        const root = document.getElementById('accordion-root');
        root.innerHTML = communities.map(comm => {
            const list = data.filter(d => d.category === comm);
            return `
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <span class="cat-name">${comm}</span>
                        <span style="font-size:0.8rem; font-weight:700;">${list.length} Entries ▾</span>
                    </div>
                    <div class="accordion-content">
                        ${list.length === 0 ? '<p style="color:gray; font-size:0.8rem;">No data yet</p>' : 
                            list.map(d => `<div class="score-row"><span>${d.full_name}</span><span class="score-val">${d.total_correct}</span></div>`).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleAccordion(header) {
        header.classList.toggle('active');
        header.nextElementSibling.classList.toggle('open');
    }

    function toggleAll(expand) {
        document.querySelectorAll('.accordion-header').forEach(h => {
            expand ? h.classList.add('active') : h.classList.remove('active');
            expand ? h.nextElementSibling.classList.add('open') : h.nextElementSibling.classList.remove('open');
        });
    }

    loadDashboard();
</script>
</body>
</html>
