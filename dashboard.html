<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings Dashboard | TechTnpsc</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes subtleBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .blinking-dash {
            animation: subtleBlink 2s infinite;
            font-weight: 900; color: #9ca3af; display: inline-block;
        }

        .share-container { margin-top: 20px; text-align: center; }
        .share-label { font-size: 0.65rem; font-weight: 800; color: #9ca3af; text-transform: uppercase; margin-bottom: 12px; }
        
        .accordion-header.active h4, 
        .accordion-header.active .arrow { color: white !important; }

        /* Combination Filter Chips */
        .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 15px; background: #f9fafb; border-bottom: 1px solid #f3f4f6; }
        .chip { 
            font-size: 0.55rem; font-weight: 800; padding: 5px 10px; border-radius: 15px; 
            border: 1px solid #e5e7eb; background: white; color: #6b7280; cursor: pointer; transition: all 0.2s;
            text-transform: uppercase;
        }
        .chip.active { background: var(--primary-purple); color: white; border-color: var(--primary-purple); }
    </style>
</head>
<body>

<div class="db-container" style="position: relative; padding-bottom: 50px;">
    <header class="db-header" style="margin-top: 20px;">
        <div style="text-align: center; width: 100%;">
            <img src="images/techtnpsclogo.PNG" alt="Logo" style="max-height: 60px; width: auto; margin-bottom: 10px;">
            <h1 style="color:var(--primary-purple); margin:0; font-size:1.4rem; font-weight: 900;">TNPSC Group 2A Mains 2026</h1>
            <div id="total-badge" style="display: inline-block; background: var(--primary-purple); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; margin-top: 10px;">
                Total Submissions: --
            </div>
        </div>
    </header>

    <div class="accordion-item" style="margin: 20px 0; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); background: white; overflow: hidden;">
        <div class="accordion-header" onclick="toggleAccordion(this)" style="padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
            <h4 style="margin: 0; color: var(--primary-purple); font-size: 0.9rem; font-weight: 800;">Show Expected Cutoff</h4>
            <span class="arrow" style="font-weight:bold; color: var(--primary-purple);">▾</span>
        </div>
        <div class="accordion-content" style="padding: 0 20px 20px 20px;">
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; margin-bottom: 15px;">
                    <thead>
                        <tr style="background: #f9fafb; border-bottom: 2px solid #e5e7eb;">
                            <th style="padding: 8px; text-align: left; color: #6b7280;">CATEGORY</th>
                            <th style="padding: 8px; text-align: center; color: #6b7280;">PREDICTED CUT-OFF</th>
                        </tr>
                    </thead>
                    <tbody id="cutoff-table-body"></tbody>
                </table>
            </div>
            <p style="margin: 5px 0; font-size: 0.7rem; color: #ef4444; font-weight: 700; text-align: center;">Waiting for 1000 submissions for precision trends.</p>
            <div style="width: 100%; height: 6px; background: #f3f4f6; border-radius: 10px; overflow: hidden; margin-top: 10px;">
                <div id="sync-progress" style="height: 100%; background: #10b981; width: 0%; transition: width 1s ease-in-out;"></div>
            </div>
            <p id="data-goal" style="font-size: 0.55rem; color: #9ca3af; margin-top: 5px; font-weight: 600; text-align: center;">Sample Progress: 0%</p>
        </div>
    </div>

    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 5px;">
        <h3 style="font-size: 0.9rem; color: var(--text-main); margin:0; font-weight: 900; letter-spacing: 0.5px;">COMMUNAL BREAKDOWN</h3>
        <div style="display:flex; gap:8px;">
            <button onclick="toggleAll(true)" class="btn-outline" style="font-size:0.6rem; padding:4px 8px;">Expand All</button>
            <button onclick="toggleAll(false)" class="btn-outline" style="font-size:0.6rem; padding:4px 8px;">Collapse All</button>
        </div>
    </div>

    <div id="accordion-root">
        <p style="text-align:center; padding:40px; color:var(--primary-purple); font-weight: 800;">Synchronizing database...</p>
    </div>

    <div style="margin-top: 40px; text-align: center; border-top: 1px dashed #e5e7eb; padding-top: 30px;">
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" style="background: none; border: none; color: #9ca3af; font-size: 0.7rem; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 25px;">↑ Back to top</button>
        <div style="background: #f5f3ff; border: 1px solid #ddd6fe; border-radius: 15px; padding: 20px; margin-bottom: 20px;">
            <p style="margin: 0 0 15px 0; font-size: 0.85rem; color: #5b21b6; font-weight: 800;">Add your performance to the list!</p>
            <a href="index.html" class="btn-primary" style="display: block; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: 900; font-size: 1rem;">SUBMIT YOUR SCORE</a>
        </div>
        <div style="background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 20px; text-align: center;">
            <a href="https://t.me/+jQ-3e_jl84cxOGE1" target="_blank" style="display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: #0088cc; color: white; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: 800; font-size: 0.9rem; width: 85%;">JOIN TELEGRAM CHANNEL</a>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://tmxtrpcxgowyvsijptjy.supabase.co";
    const SB_KEY = "sb_publishable_HyUD5W3MBGCUNYiNLOZHKQ_mMVcKa1-";
    
    // Fixed initialization for CDN usage
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const communities = ['OVERALL', 'BC', 'BCM', 'MBC', 'SC', 'SCA', 'ST', 'GT'];
    const cutoffOrder = ['GT', 'BC', 'BCM', 'MBC', 'SC', 'SCA', 'ST'];
    let allData = [];
    let currentFilters = {}; 

    async function loadDashboard() {
        console.log("Starting database sync...");
        try {
            const { data, error } = await supabaseClient
                .from('candidate_scores')
                .select('*')
                .order('total_correct', { ascending: false });

            if (error) throw error;

            allData = data;
            document.getElementById('total-badge').innerText = `Total Submissions: ${data.length}`;
            updatePredictionStats(data.length);
            renderAccordions();
            renderCutoffTable();
            console.log("Sync complete.");
        } catch (err) {
            console.error("Database Error:", err);
            document.getElementById('accordion-root').innerHTML = `<p style="color:red; text-align:center; padding:20px;">Error connecting to database. Please check your internet or Supabase keys.</p>`;
        }
    }

    function toggleAccordion(header) {
        header.classList.toggle('active');
        const content = header.nextElementSibling;
        content.classList.toggle('open');
        header.querySelector('.arrow').innerText = content.classList.contains('open') ? '▴' : '▾';
    }

    function renderCutoffTable() {
        const tableBody = document.getElementById('cutoff-table-body');
        tableBody.innerHTML = cutoffOrder.map(comm => `
            <tr style="border-bottom: 1px solid #f3f4f6;">
                <td style="padding: 8px; font-weight: 800; color: #374151;">${comm}</td>
                <td style="padding: 8px; text-align: center;"><span class="blinking-dash">—</span></td>
            </tr>
        `).join('');
    }

    function updatePredictionStats(count) {
        const progressBar = document.getElementById('sync-progress');
        const progressPercent = Math.min((count / 1000) * 100, 100).toFixed(0);
        if(progressBar) progressBar.style.width = progressPercent + "%";
        document.getElementById('data-goal').innerText = `Sample Progress: ${progressPercent}% (${count}/1000)`;
    }

    function renderAccordions() {
        const root = document.getElementById('accordion-root');
        root.innerHTML = communities.map(comm => {
            const list = comm === 'OVERALL' ? allData : allData.filter(d => d.category === comm);
            const has = (key) => list.some(d => d[key]);
            currentFilters[comm] = [];

            return `
                <div class="accordion-item" id="item-${comm}">
                    <div class="accordion-header" onclick="toggleAccordion(this)" style="${comm === 'OVERALL' ? 'border-left: 4px solid var(--primary-purple);' : ''}">
                        <div><span style="font-weight:800;">${comm === 'OVERALL' ? 'STATE-WIDE OVERALL' : comm}</span><span style="font-size:0.7rem; color:#9ca3af; margin-left:8px;">${list.length} Candidates</span></div>
                        <span class="arrow">▾</span>
                    </div>
                    <div class="accordion-content">
                        <div class="filter-chips">
                            ${has('is_woman') ? `<div class="chip" onclick="toggleChip('${comm}', 'is_woman', this)">Woman</div>` : ''}
                            ${has('is_pstm') ? `<div class="chip" onclick="toggleChip('${comm}', 'is_pstm', this)">PSTM</div>` : ''}
                            ${has('is_exser') ? `<div class="chip" onclick="toggleChip('${comm}', 'is_exser', this)">Ex-Ser</div>` : ''}
                            ${has('is_dw') ? `<div class="chip" onclick="toggleChip('${comm}', 'is_dw', this)">DW</div>` : ''}
                            ${has('is_hi_hh') ? `<div class="chip" onclick="toggleChip('${comm}', 'is_hi_hh', this)">HI/HH</div>` : ''}
                            ${has('is_vi_lv') ? `<div class="chip" onclick="toggleChip('${comm}', 'is_vi_lv', this)">VI/LV</div>` : ''}
                            ${has('is_ld_cp') ? `<div class="chip" onclick="toggleChip('${comm}', 'is_ld_cp', this)">LD/CP</div>` : ''}
                            ${has('is_asd_md') ? `<div class="chip" onclick="toggleChip('${comm}', 'is_asd_md', this)">ASD/MD</div>` : ''}
                        </div>
                        <div id="list-container-${comm}">${renderList(list, comm === 'OVERALL')}</div>
                    </div>
                </div>`;
        }).join('');
    }

    function toggleChip(comm, filterKey, element) {
        element.classList.toggle('active');
        if (currentFilters[comm].includes(filterKey)) {
            currentFilters[comm] = currentFilters[comm].filter(k => k !== filterKey);
        } else {
            currentFilters[comm].push(filterKey);
        }

        let filtered = comm === 'OVERALL' ? allData : allData.filter(d => d.category === comm);
        currentFilters[comm].forEach(key => {
            filtered = filtered.filter(d => d[key] === true);
        });
        document.getElementById(`list-container-${comm}`).innerHTML = renderList(filtered, comm === 'OVERALL');
    }

    function renderList(list, showTag) {
        if (!list.length) return '<p style="padding:20px; text-align:center; color:#9ca3af; font-size:0.8rem;">No matches found.</p>';
        return list.map((d, index) => {
            let tags = [];
            if(showTag) tags.push(d.category);
            if(d.is_woman) tags.push("W");
            if(d.is_pstm) tags.push("PSTM");
            if(d.is_exser) tags.push("EX");
            if(d.is_dw) tags.push("DW");
            if(d.is_vi_lv) tags.push("VI/LV");
            if(d.is_hi_hh) tags.push("HI/HH");
            if(d.is_ld_cp) tags.push("LD/CP");
            if(d.is_asd_md) tags.push("ASD/MD");
            let medal = index === 0 ? '🥇 ' : index === 1 ? '🥈 ' : index === 2 ? '🥉 ' : '';
            return `
                <div style="display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #f9fafb; align-items: center;">
                    <div style="max-width: 70%;">
                        <span style="font-weight:700; color: #1f2937;">${medal}${d.full_name}</span>
                        <span style="display:block; font-size:0.6rem; color:var(--primary-purple); font-weight:800; text-transform: uppercase; margin-top: 2px;">${tags.join(' • ')}</span>
                    </div>
                    <div style="text-align:right;">
                        <span style="font-weight: 800; color: var(--primary-purple); font-size: 1.1rem;">${d.total_correct}</span>
                        <div style="font-size:0.55rem; color:#9ca3af; font-weight:bold;">RANK ${index + 1}</div>
                    </div>
                </div>`;
        }).join('');
    }

    function toggleAll(expand) {
        document.querySelectorAll('#accordion-root .accordion-header').forEach(h => {
            const content = h.nextElementSibling;
            h.classList.toggle('active', expand);
            content.classList.toggle('open', expand);
            h.querySelector('.arrow').innerText = expand ? '▴' : '▾';
        });
    }

    loadDashboard();
</script>
</body>
</html>
