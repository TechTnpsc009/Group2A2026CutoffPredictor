<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="db-container">
    <header class="db-header">
        <h1 style="color:var(--primary-purple); margin:0;">Live Rankings</h1>
        <div style="display:flex; gap:10px;">
            <button onclick="toggleAll(true)" class="btn-outline" style="font-size:0.7rem;">Expand All</button>
            <button onclick="toggleAll(false)" class="btn-outline" style="font-size:0.7rem;">Collapse All</button>
        </div>
    </header>

    <div id="accordion-root"></div>
    
    <div style="margin-top:30px; text-align:center;">
        <a href="index.html" class="btn-primary" style="padding: 15px 40px;">Add your score</a>
    </div>
</div>

<div class="footer-sig">An Allwin-Sugitha Initiative</div>

<script>
    const SB_URL = "https://tmxtrpcxgowyvsijptjy.supabase.co";
    const SB_KEY = "sb_publishable_HyUD5W3MBGCUNYiNLOZHKQ_mMVcKa1-";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    const communities = ['GT', 'BC', 'BCM', 'MBC', 'SC', 'SCA', 'ST'];
    let allData = [];

    async function loadDashboard() {
        const { data, error } = await supabaseClient.from('candidate_scores').select('*').order('total_correct', { ascending: false });
        if (error) return;
        allData = data;
        renderAccordions();
    }

    function renderAccordions() {
        const root = document.getElementById('accordion-root');
        root.innerHTML = communities.map(comm => {
            const list = allData.filter(d => d.category === comm);
            return `
                <div class="accordion-item" id="item-${comm}">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <span class="cat-name">${comm}</span>
                        <span style="font-size:0.8rem; font-weight:700;">${list.length} Total Entries ▾</span>
                    </div>
                    <div class="accordion-content">
                        <div style="margin-bottom:15px; display:flex; gap:8px; flex-wrap:wrap;">
                            <button onclick="filterSub('${comm}', 'all')" class="sub-filter-btn">All ${comm}</button>
                            <button onclick="filterSub('${comm}', 'w')" class="sub-filter-btn">${comm}_Women</button>
                            <button onclick="filterSub('${comm}', 'pstm')" class="sub-filter-btn">${comm}_PSTM</button>
                            <button onclick="filterSub('${comm}', 'w_pstm')" class="sub-filter-btn">${comm}_W_PSTM</button>
                        </div>
                        <div id="list-container-${comm}">
                            ${renderList(list)}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderList(list) {
        if (list.length === 0) return '<p style="color:gray; font-size:0.8rem; padding:10px;">No data for this filter.</p>';
        return list.map(d => `
            <div class="score-row">
                <span>${d.full_name} ${d.is_pstm ? '<small style="color:var(--primary-purple)">(PSTM)</small>' : ''}</span>
                <span class="score-val">${d.total_correct}</span>
            </div>
        `).join('');
    }

    function filterSub(comm, type) {
        event.stopPropagation(); // Prevents accordion from closing
        let filtered = allData.filter(d => d.category === comm);
        
        if (type === 'w') filtered = filtered.filter(d => d.is_woman);
        if (type === 'pstm') filtered = filtered.filter(d => d.is_pstm);
        if (type === 'w_pstm') filtered = filtered.filter(d => d.is_woman && d.is_pstm);

        document.getElementById(`list-container-${comm}`).innerHTML = renderList(filtered);
    }

    function toggleAccordion(header) {
        header.classList.toggle('active');
        header.nextElementSibling.classList.toggle('open');
    }

    function toggleAll(expand) {
        document.querySelectorAll('.accordion-header').forEach(h => {
            expand ? h.classList.add('active') : h.classList.remove('active');
            expand ? h.nextElementSibling.classList.add('open') : h.nextElementSibling.classList.remove('open');
        });
    }

    loadDashboard();
</script>

<style>
    /* Sub-filter button styling added here to ensure dashboard looks great */
    .sub-filter-btn {
        background: #f3f0ff;
        border: 1px solid var(--border-purple);
        color: var(--primary-purple);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 700;
        cursor: pointer;
    }
    .sub-filter-btn:hover { background: var(--primary-purple); color: white; }
</style>
</body>
</html>
