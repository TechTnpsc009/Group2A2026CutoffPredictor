<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Group 2A Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="db-header">
    <div>
        <h1 style="margin:0; font-size:1.4rem;">Live Analysis Dashboard</h1>
        <p style="margin:5px 0 0 0; font-size:0.8rem; color:var(--text-dim);">Real-time community rankings</p>
    </div>
    <div style="display:flex; gap:10px;">
        <button onclick="refreshData()" class="nav-btn" style="background:transparent; border:1px solid var(--primary-purple);">Refresh</button>
        <a href="index.html" class="nav-btn">Add My Score</a>
    </div>
</header>

<div class="category-grid" id="mainGrid"></div>

<div class="footer-sig">An Allwin-Sugitha Initiative</div>

<script>
    const SB_URL = "https://tmxtrpcxgowyvsijptjy.supabase.co";
    const SB_KEY = "sb_publishable_HyUD5W3MBGCUNYiNLOZHKQ_mMVcKa1-";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const communities = ['GT', 'BC', 'BCM', 'MBC', 'SC', 'SCA', 'ST'];
    let rawData = [];

    document.addEventListener('DOMContentLoaded', async () => {
        setupGrid();
        await refreshData();
    });

    function setupGrid() {
        const grid = document.getElementById('mainGrid');
        communities.forEach(comm => {
            const card = document.createElement('div');
            card.className = 'cat-card';
            card.innerHTML = `
                <div class="cat-header">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="cat-name">${comm}</span>
                        <span id="count-${comm}" style="color:var(--text-dim); font-size:0.75rem;">0</span>
                    </div>
                    <select class="column-filter" onchange="renderList('${comm}', this.value)">
                        <option value="ALL">All entries</option>
                        <option value="W">Women</option>
                        <option value="PSTM">PSTM</option>
                        <option value="W_PSTM">W + PSTM</option>
                    </select>
                </div>
                <div class="score-list" id="list-${comm}" style="flex-grow:1; overflow-y:auto;"></div>
            `;
            grid.appendChild(card);
        });
    }

    async function refreshData() {
        const { data, error } = await supabaseClient.from('candidate_scores').select('*').order('total_correct', { ascending: false });
        if (!error) { rawData = data; communities.forEach(comm => renderList(comm, "ALL")); }
    }

    function renderList(comm, filterType) {
        const container = document.getElementById(`list-${comm}`);
        const countDisplay = document.getElementById(`count-${comm}`);
        let filtered = rawData.filter(d => d.category === comm);
        if (filterType === "W") filtered = filtered.filter(d => d.is_woman);
        if (filterType === "PSTM") filtered = filtered.filter(d => d.is_pstm);
        if (filterType === "W_PSTM") filtered = filtered.filter(d => d.is_woman && d.is_pstm);
        countDisplay.innerText = filtered.length;
        container.innerHTML = filtered.length === 0 ? `<p style="padding:20px; text-align:center; font-size:0.8rem; color:var(--text-dim);">No Data</p>` :
            filtered.map(d => `<div class="score-item">
                <span style="font-size:0.85rem;">${d.full_name}</span>
                <span class="cand-score">${d.total_correct}</span>
            </div>`).join('');
    }
</script>
</body>
</html>
