<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Marks | Group 2A Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="main-content">
    <div class="form-card">
        <div style="margin-bottom: 25px; text-align: center;">
            <a href="dashboard.html" class="btn-outline" style="display: block; width: 100%; box-sizing: border-box; padding: 12px;">View current scores and ranks →</a>
        </div>

        <header>
            <h1>Submit Your Mark</h1>
            <p>Enter your details to see where you stand</p>
        </header>

        <form id="scoreForm">
            <div class="field">
                <label>Nickname</label>
                <input type="text" id="full_name" placeholder="Optional">
            </div>

            <div class="field">
                <label>Total Correct Questions (Max 200)</label>
                <input type="number" id="total_correct" required min="0" max="200" placeholder="000">
            </div>

            <div class="field">
                <label>Community</label>
                <select id="category" required>
                    <option value="" disabled selected>Select Community</option>
                    <option value="GT">GT</option>
                    <option value="BC">BC</option>
                    <option value="BCM">BCM</option>
                    <option value="MBC">MBC</option>
                    <option value="SC">SC</option>
                    <option value="SCA">SCA</option>
                    <option value="ST">ST</option>
                </select>
            </div>

            <div class="check-container">
                <label class="check-item"><input type="checkbox" id="is_woman"> Woman</label>
                <label class="check-item"><input type="checkbox" id="is_pstm"> PSTM</label>
                <div class="dotted-divider"></div>
                <label class="check-item"><input type="checkbox" id="is_vi_lv"> VI / LV</label>
                <label class="check-item"><input type="checkbox" id="is_hi_hh"> HI / HH</label>
                <label class="check-item"><input type="checkbox" id="is_ld_cp"> LD / CP / LC / DF / AC / MuD</label>
                <label class="check-item"><input type="checkbox" id="is_asd_md"> ASD / ID / SLD / MI / MD</label>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary" style="width:100%;">Submit Marks</button>
        </form>
    </div>
</div>

<div class="footer-sig">An Allwin-Sugitha Initiative</div>
<script src="script.js"></script>
</body>
</html>
