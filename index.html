<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTnpsc | Group 2A Cutoff Predictor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Social Sharing Styles */
        .share-container { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #e5e7eb; text-align: center; }
        .share-label { font-size: 0.65rem; font-weight: 800; color: #9ca3af; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        .social-icons { display: flex; justify-content: center; gap: 15px; }
        .icon-circle { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); outline: none; }
        .icon-circle:active { transform: scale(0.9); }
        .whatsapp { background: #25D366; color: white; }
        .telegram { background: #0088cc; color: white; }
        .generic-share { background: #6366f1; color: white; }
        .social-icons svg { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="form-card">
        <div class="initiative-tag"></div>

        <div style="text-align: center; margin-bottom: 25px;">
            <img src="images/techtnpsclogo.PNG" alt="TechTnpsc Logo" style="max-height: 70px; width: auto; margin-bottom: 10px;">
            <h3 style="color: var(--primary-purple); font-weight: 800; letter-spacing: 1px; margin: 0 0 5px 0; font-size: 1.2rem;">
                TNPSC GROUP 2A MAINS 2026
            </h3>
            <div style="width: 40px; height: 3px; background: var(--primary-purple); margin: 0 auto; border-radius: 2px;"></div>
        </div>

        <a href="dashboard.html" class="btn-outline-full">View current scores and ranks →</a>

        <div class="or-divider">
            <span>OR</span>
        </div>

        <h2 style="margin:0 0 5px 0; color:var(--text-main); font-size: 1.6rem;">Submit Your Mark</h2>
        <p style="color:#6b7280; font-size:0.85rem; margin-bottom: 25px;">Enter your details to see where you stand</p>

        <form id="scoreForm">
            <div style="display:none;">
                <input type="text" id="hp_field" tabindex="-1" autocomplete="off">
            </div>

            <div class="field">
                <label for="full_name">Name (Optional)</label>
                <input type="text" id="full_name" placeholder="" maxlength="20">
            </div>

            <div class="field">
                <label for="total_correct">Total Correct Questions (Max 200)</label>
                <input type="number" id="total_correct" placeholder="" min="0" max="200" required>
            </div>

            <div class="field">
                <label for="category">Community</label>
                <select id="category" required>
                    <option value="" disabled selected>Select Community</option>
                    <option value="GT">GT (General Turn)</option>
                    <option value="BC">BC (Other than Muslim)</option>
                    <option value="BCM">BC (Muslim)</option>
                    <option value="MBC">MBC / DNC</option>
                    <option value="SC">SC</option>
                    <option value="SCA">SC (Arunthathiyar)</option>
                    <option value="ST">ST</option>
                </select>
            </div>

            <div class="check-container">
                <label class="check-item">
                    <input type="checkbox" id="is_woman"> Woman
                </label>
                <label class="check-item">
                    <input type="checkbox" id="is_pstm"> PSTM (Tamil Medium)
                </label>
                <label class="check-item">
                    <input type="checkbox" id="is_exser"> Ex-Serviceman
                </label>
                <label class="check-item">
                    <input type="checkbox" id="is_dw"> Destitute Widow (DW)
                </label>
                
                <div class="dotted-divider"></div>
                <p style="font-size:0.7rem; font-weight:800; color:var(--primary-purple); margin-bottom:10px;">SPECIAL CATEGORY (PwD)</p>
                
                <label class="check-item">
                    <input type="checkbox" id="is_vi_lv"> VI / LV (Visual)
                </label>
                <label class="check-item">
                    <input type="checkbox" id="is_hi_hh"> HI / HH (Hearing)
                </label>
                <label class="check-item">
                    <input type="checkbox" id="is_ld_cp"> LD / CP / LC / DF / AC
                </label>
                <label class="check-item">
                    <input type="checkbox" id="is_asd_md"> ASD / SLD / MI / MD
                </label>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary" style="width:100%;">Submit Marks</button>
            
            <div id="statusMsg" style="margin-top: 15px; text-align: center; font-size: 1rem; font-weight: 900; display: none; line-height: 1.4;"></div>
        </form>

        <div class="share-container">
            <div class="share-label">Invite your friends and ask them to submit their score</div>
            <div class="social-icons">
                <button class="icon-circle whatsapp" onclick="socialShare('wa')"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></button>
                <button class="icon-circle telegram" onclick="socialShare('tg')"><svg viewBox="0 0 24 24"><path d="M11.944 0C5.347 0 0 5.347 0 11.944c0 6.597 5.347 11.944 11.944 11.944 6.596 0 11.944-5.347 11.944-11.944C23.888 5.347 18.54 0 11.944 0zm5.83 7.828l-1.972 9.308c-.148.663-.541.826-1.094.515l-3.004-2.212-1.45 1.394c-.16.16-.295.295-.605.295l.216-3.064 5.576-5.038c.242-.216-.053-.336-.374-.122L8.216 13.43l-2.973-.928c-.647-.202-.66-.647.135-.958l11.623-4.48c.538-.196 1.01.127.773.764z"/></svg></button>
                <button class="icon-circle generic-share" onclick="socialShare('native')"><svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg></button>
            </div>
        </div>
        <div style="margin-top: 25px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 15px; text-align: center;">
            <p style="margin: 0 0 10px 0; font-size: 0.75rem; font-weight: 800; color: #1e40af; text-transform: uppercase; letter-spacing: 0.5px;">Get Instant Updates</p>
            <a href="https://t.me/+jQ-3e_jl84cxOGE1" target="_blank" style="display: inline-flex; align-items: center; gap: 8px; background: #0088cc; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0, 136, 204, 0.2);">
                <svg style="width:18px; height:18px; fill:currentColor;" viewBox="0 0 24 24"><path d="M11.944 0C5.347 0 0 5.347 0 11.944c0 6.597 5.347 11.944 11.944 11.944 6.596 0 11.944-5.347 11.944-11.944C23.888 5.347 18.54 0 11.944 0zm5.83 7.828l-1.972 9.308c-.148.663-.541.826-1.094.515l-3.004-2.212-1.45 1.394c-.16.16-.295.295-.605.295l.216-3.064 5.576-5.038c.242-.216-.053-.336-.374-.122L8.216 13.43l-2.973-.928c-.647-.202-.66-.647.135-.958l11.623-4.48c.538-.196 1.01.127.773.764z"/></svg>
                JOIN TELEGRAM CHANNEL
            </a>
            <p style="margin-top: 8px; font-size: 0.6rem; color: #60a5fa; font-weight: 700;">Discussion & Cutoff Analysis</p>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://tmxtrpcxgowyvsijptjy.supabase.co";
    const SB_KEY = "sb_publishable_HyUD5W3MBGCUNYiNLOZHKQ_mMVcKa1-";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const scoreForm = document.getElementById('scoreForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    function showStatus(text, color) {
        statusMsg.innerText = text;
        statusMsg.style.color = color;
        statusMsg.style.display = 'block';
    }

    function socialShare(platform) {
        const url = window.location.href;
        const msg = "Check your TNPSC Group 2A rank and expected cutoff here: " + url;
        if (platform === 'wa') window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
        else if (platform === 'tg') window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(msg)}`);
        else if (navigator.share) navigator.share({ title: 'TechTnpsc Cutoff', url });
    }

    scoreForm.onsubmit = async (e) => {
        e.preventDefault();
        if (document.getElementById('hp_field').value !== "") return;

        const rawName = document.getElementById('full_name').value.trim();
        const isTester = rawName.toLowerCase().startsWith('riya');

        if (!isTester && localStorage.getItem('tnpsc_submitted_2026')) {
            showStatus("⚠️ You have already submitted your marks!", "#ef4444");
            return;
        }

        submitBtn.disabled = true;
        showStatus("Processing...", "var(--primary-purple)");

        try {
            // Get Current Count from Supabase for Dynamic Naming
            const { count, error: countErr } = await supabaseClient
                .from('candidate_scores')
                .select('*', { count: 'exact', head: true });
            
            if (countErr) throw countErr;

            // If name is empty, assign Candidate_N
            const finalName = rawName || `Candidate_${count + 1}`;

            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            const userIp = ipData.ip;

            const formData = {
                full_name: finalName,
                total_correct: parseInt(document.getElementById('total_correct').value),
                category: document.getElementById('category').value,
                is_woman: document.getElementById('is_woman').checked,
                is_pstm: document.getElementById('is_pstm').checked,
                is_exser: document.getElementById('is_exser').checked,
                is_dw: document.getElementById('is_dw').checked,
                is_vi_lv: document.getElementById('is_vi_lv').checked,
                is_hi_hh: document.getElementById('is_hi_hh').checked,
                is_ld_cp: document.getElementById('is_ld_cp').checked,
                is_asd_md: document.getElementById('is_asd_md').checked,
                ip_address: userIp
            };

            const { error } = await supabaseClient.from('candidate_scores').insert([formData]);
            if (error) throw error;

            if (!isTester) {
                localStorage.setItem('tnpsc_submitted_2026', 'true');
            }

            let seconds = 3;
            const timer = setInterval(() => {
                showStatus(`Success! Submitted as ${finalName}. Redirecting in ${seconds}s...`, "#065f46");
                seconds--;
                if (seconds < 0) {
                    clearInterval(timer);
                    window.location.href = "dashboard.html";
                }
            }, 1000);

        } catch (err) {
            showStatus("Error: " + err.message, "#ef4444");
            submitBtn.disabled = false;
        }
    };
</script>

</body>
</html>
