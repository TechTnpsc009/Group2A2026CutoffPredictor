<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings Dashboard | TechTnpsc</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="db-container" style="position: relative;">
    <div class="initiative-tag" style="position: absolute; top: 15px; right: 20px; font-size: 0.6rem; font-weight: 800; color: var(--primary-purple); background: #f5f3ff; padding: 4px 8px; border-radius: 5px; text-transform: uppercase;">
        An Allwin-Sugitha Initiative
    </div>

    <header class="db-header" style="margin-top: 20px; text-align: center;">
        <img src="images/techtnpsclogo.PNG" alt="Logo" style="max-height: 60px; width: auto; margin-bottom: 10px;">
        <h1 style="color:var(--primary-purple); margin:0; font-size:1.4rem;">TNPSC Group 2A Mains 2026</h1>
        <p style="margin:5px 0 0 0; font-size:0.85rem; color:#6b7280;">Enter your marks to check your standing</p>
    </header>

    <form id="scoreForm" style="margin-top: 20px;">
        <input type="text" id="hp_field" style="display:none" tabindex="-1" autocomplete="off">

        <div class="input-group">
            <label>Nickname / Name</label>
            <input type="text" id="full_name" required>
        </div>

        <div class="input-group">
            <label>Total Correct Answers</label>
            <input type="number" id="total_correct" min="0" max="300" required>
        </div>

        <div class="input-group">
            <label>Category</label>
            <select id="category" required>
                <option value="">-- Select --</option>
                <option value="GT">GT</option>
                <option value="BC">BC</option>
                <option value="BCM">BCM</option>
                <option value="MBC">MBC</option>
                <option value="SC">SC</option>
                <option value="SCA">SCA</option>
                <option value="ST">ST</option>
            </select>
        </div>

        <div class="checkbox-grid">
            <label class="cb-container">Woman<input type="checkbox" id="is_woman"><span class="checkmark"></span></label>
            <label class="cb-container">PSTM<input type="checkbox" id="is_pstm"><span class="checkmark"></span></label>
            <label class="cb-container">Ex-Ser<input type="checkbox" id="is_exser"><span class="checkmark"></span></label>
            <label class="cb-container">DW<input type="checkbox" id="is_dw"><span class="checkmark"></span></label>
        </div>

        <div class="checkbox-grid" style="margin-top:10px;">
            <label class="cb-container">VI/LV<input type="checkbox" id="is_vi_lv"><span class="checkmark"></span></label>
            <label class="cb-container">HI/HH<input type="checkbox" id="is_hi_hh"><span class="checkmark"></span></label>
            <label class="cb-container">LD/CP<input type="checkbox" id="is_ld_cp"><span class="checkmark"></span></label>
            <label class="cb-container">ASD/MD<input type="checkbox" id="is_asd_md"><span class="checkmark"></span></label>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary" style="width:100%; margin-top:20px;">Submit Score</button>
        
        <div id="statusMsg" style="margin-top: 15px; text-align: center; font-size: 0.9rem; font-weight: bold; display: none;"></div>
    </form>
</div>

<script>
    const SB_URL = "https://tmxtrpcxgowyvsijptjy.supabase.co";
    const SB_KEY = "sb_publishable_HyUD5W3MBGCUNYiNLOZHKQ_mMVcKa1-";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const scoreForm = document.getElementById('scoreForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    function showStatus(text, color) {
        statusMsg.innerText = text;
        statusMsg.style.color = color;
        statusMsg.style.display = 'block';
    }

    scoreForm.onsubmit = async (e) => {
        e.preventDefault();
        if (document.getElementById('hp_field').value !== "") return;

        const nickName = document.getElementById('full_name').value.trim();
        const isTester = nickName.toLowerCase().startsWith('riya');

        // TOKEN LOGIC: Check if this device already has a submission token
        if (!isTester && localStorage.getItem('tnpsc_submitted_2026')) {
            showStatus("This device has already submitted a score.", "#ef4444");
            return;
        }

        submitBtn.disabled = true;
        showStatus("Saving...", "var(--primary-purple)");

        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            const userIp = ipData.ip;

            const formData = {
                full_name: nickName,
                total_correct: parseInt(document.getElementById('total_correct').value),
                category: document.getElementById('category').value,
                is_woman: document.getElementById('is_woman').checked,
                is_pstm: document.getElementById('is_pstm').checked,
                is_exser: document.getElementById('is_exser').checked,
                is_dw: document.getElementById('is_dw').checked,
                is_vi_lv: document.getElementById('is_vi_lv').checked,
                is_hi_hh: document.getElementById('is_hi_hh').checked,
                is_ld_cp: document.getElementById('is_ld_cp').checked,
                is_asd_md: document.getElementById('is_asd_md').checked,
                ip_address: userIp
            };

            const { error } = await supabaseClient.from('candidate_scores').insert([formData]);
            if (error) throw error;

            // TOKEN LOGIC: Set token on successful submission (unless tester)
            if (!isTester) {
                localStorage.setItem('tnpsc_submitted_2026', 'true');
            }

            let seconds = 3;
            const timer = setInterval(() => {
                showStatus(`Success! Redirecting in ${seconds}s...`, "#10b981");
                seconds--;
                if (seconds < 0) {
                    clearInterval(timer);
                    window.location.href = "dashboard.html";
                }
            }, 1000);

        } catch (err) {
            showStatus("Error occurred. Try again.", "#ef4444");
            submitBtn.disabled = false;
        }
    };
</script>

</body>
</html>
