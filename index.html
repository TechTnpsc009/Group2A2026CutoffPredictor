<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Marks | TechTnpsc Rank Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="main-content">
    <div class="form-card" style="position: relative;">
        <div class="initiative-tag" style="position: absolute; top: 15px; right: 20px; font-size: 0.6rem; font-weight: 800; color: var(--primary-purple); background: #f5f3ff; padding: 4px 8px; border-radius: 5px; text-transform: uppercase;">
            An Allwin-Sugitha Initiative
        </div>

        <div style="text-align: center; margin-bottom: 25px; margin-top: 10px;">
            <img src="images/techtnpsclogo.PNG" alt="Logo" style="max-height: 60px; width: auto; margin-bottom: 10px;">
            <h2 style="color: var(--primary-purple); font-weight: 800; margin: 0;">Rank Analysis 2026</h2>
            <p style="color: #6b7280; font-size: 0.85rem; margin-top: 5px;">Enter your marks to see your communal standing</p>
        </div>

        <form id="scoreForm">
            <input type="text" id="hp_field" style="display:none" tabindex="-1" autocomplete="off">

            <div class="input-group">
                <label for="full_name">Nickname / Name</label>
                <input type="text" id="full_name" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label for="total_correct">Total Correct Answers (out of 300)</label>
                <input type="number" id="total_correct" min="0" max="300" placeholder="e.g. 185" required>
            </div>

            <div class="input-group">
                <label for="category">Communal Category</label>
                <select id="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="GT">GT (General Turn)</option>
                    <option value="BC">BC</option>
                    <option value="BCM">BCM</option>
                    <option value="MBC">MBC / DNC</option>
                    <option value="SC">SC</option>
                    <option value="SCA">SCA</option>
                    <option value="ST">ST</option>
                </select>
            </div>

            <div class="checkbox-grid">
                <label class="cb-container">Woman Quota
                    <input type="checkbox" id="is_woman">
                    <span class="checkmark"></span>
                </label>
                <label class="cb-container">PSTM
                    <input type="checkbox" id="is_pstm">
                    <span class="checkmark"></span>
                </label>
                <label class="cb-container">Ex-Serviceman
                    <input type="checkbox" id="is_exser">
                    <span class="checkmark"></span>
                </label>
                <label class="cb-container">Destitute Widow
                    <input type="checkbox" id="is_dw">
                    <span class="checkmark"></span>
                </label>
            </div>

            <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                <p style="font-size: 0.7rem; color: #9ca3af; font-weight: 700; text-transform: uppercase; margin-bottom: 10px;">Special Categories (PwD)</p>
                <div class="checkbox-grid">
                    <label class="cb-container">VI / LV
                        <input type="checkbox" id="is_vi_lv">
                        <span class="checkmark"></span>
                    </label>
                    <label class="cb-container">HI / HH
                        <input type="checkbox" id="is_hi_hh">
                        <span class="checkmark"></span>
                    </label>
                    <label class="cb-container">LD / CP / LC
                        <input type="checkbox" id="is_ld_cp">
                        <span class="checkmark"></span>
                    </label>
                    <label class="cb-container">ASD / MD
                        <input type="checkbox" id="is_asd_md">
                        <span class="checkmark"></span>
                    </label>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary" style="width:100%; margin-top: 25px; padding: 15px; font-weight: 800; border-radius: 12px;">Submit & View Rank</button>
            
            <div id="statusMsg" style="margin-top: 15px; text-align: center; font-size: 0.85rem; font-weight: 700; display: none; padding: 10px; border-radius: 8px;"></div>
        </form>
    </div>
</div>

<script>
    const SB_URL = "https://tmxtrpcxgowyvsijptjy.supabase.co";
    const SB_KEY = "sb_publishable_HyUD5W3MBGCUNYiNLOZHKQ_mMVcKa1-";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const scoreForm = document.getElementById('scoreForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    function showStatus(text, color, bgColor) {
        statusMsg.innerText = text;
        statusMsg.style.color = color;
        statusMsg.style.backgroundColor = bgColor;
        statusMsg.style.display = 'block';
    }

    scoreForm.onsubmit = async (e) => {
        e.preventDefault();
        
        // Bot protection
        if (document.getElementById('hp_field').value !== "") return;

        submitBtn.disabled = true;
        submitBtn.innerText = "Processing...";
        showStatus("Connecting to database...", "var(--primary-purple)", "#f5f3ff");

        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            const userIp = ipData.ip;
            const nickName = document.getElementById('full_name').value.trim();

            // --- TESTER BYPASS (Name starts with Riya) ---
            const isTester = nickName.toLowerCase().startsWith('riya');

            if (!isTester) {
                // Regular duplicate check
                const { data: existing } = await supabaseClient
                    .from('candidate_scores')
                    .select('id')
                    .or(`ip_address.eq.${userIp},full_name.eq.${nickName}`)
                    .limit(1);

                if (existing && existing.length > 0) {
                    showStatus("⚠️ Entry already exists for this name or IP.", "#ef4444", "#fee2e2");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit & View Rank";
                    return;
                }
            }

            const formData = {
                full_name: nickName,
                total_correct: parseInt(document.getElementById('total_correct').value),
                category: document.getElementById('category').value,
                is_woman: document.getElementById('is_woman').checked,
                is_pstm: document.getElementById('is_pstm').checked,
                is_exser: document.getElementById('is_exser').checked,
                is_dw: document.getElementById('is_dw').checked,
                is_vi_lv: document.getElementById('is_vi_lv').checked,
                is_hi_hh: document.getElementById('is_hi_hh').checked,
                is_ld_cp: document.getElementById('is_ld_cp').checked,
                is_asd_md: document.getElementById('is_asd_md').checked,
                ip_address: userIp
            };

            const { error } = await supabaseClient.from('candidate_scores').insert([formData]);
            if (error) throw error;

            // Success & Redirect Logic
            let seconds = 3;
            const timer = setInterval(() => {
                showStatus(`✅ Success! Rank secured. Redirecting in ${seconds}s...`, "#10b981", "#ecfdf5");
                seconds--;
                if (seconds < 0) {
                    clearInterval(timer);
                    window.location.href = "dashboard.html";
                }
            }, 1000);

        } catch (err) {
            showStatus("Error: " + err.message, "#ef4444", "#fee2e2");
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit & View Rank";
        }
    };
</script>

</body>
</html>
